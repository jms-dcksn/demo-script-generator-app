# fly.toml app configuration file generated for demo-script-gen-api on 2026-03-28T14:31:06-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'demo-script-gen-api'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  OPENAI_MODEL = 'gpt-4o'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
