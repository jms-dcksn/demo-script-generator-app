    - heading "The Agent Architecture" [level=2] [ref=e26]
    - paragraph [ref=e27]:
      - text: "There are actually two LLMs at work here, not one -- and they're from different providers. The orchestrator agent runs on OpenAI's GPT-4.1-mini: fast, cheap, and good enough for routing decisions, asking discovery questions, and calling tools. When it has enough context, it calls a tool called"
      - code [ref=e28]: write_script
      - text: ", which hands off to Claude Sonnet -- Anthropic's model -- with its own system prompt specialized purely for script writing."
    - paragraph [ref=e29]: "Why two models from two providers? Each model is matched to its job. The orchestrator does structured reasoning: parse context, decide what to ask next, decide when to search, decide when to write. 4.1-mini handles that well and keeps costs low. The script writer is the deliverable -- it needs to follow a framework (Tell-Show-Tell, limbic opening) while producing natural, compelling prose. Claude is measurably better at that kind of structured creative writing."
    - paragraph [ref=e30]: Context window isolation matters too. The script writer gets a clean, focused prompt with just the structured context it needs -- no conversation history, no back-and-forth noise. It produces a better script because it isn't distracted by twelve messages of discovery chat.
