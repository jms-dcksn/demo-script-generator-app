    - heading "How This Was Built" [level=1] [ref=e4]
    - paragraph [ref=e5]: A look at the architecture, tech choices, and design thinking behind the Demo Script Generator.
    - heading "What It Does" [level=2] [ref=e6]
    - paragraph [ref=e7]: "This tool helps sales engineers and pre-sales professionals create structured demo scripts for their products. You provide product context -- a website URL, uploaded files, or a description -- and the LLM generates a script following proven demo frameworks: limbic openings, the 3 Key Ideas structure, and Tell-Show-Tell delivery."
