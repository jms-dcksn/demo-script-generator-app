    - heading "Middleware as Guardrails" [level=2] [ref=e52]
    - paragraph [ref=e53]: "The agent uses three middleware layers, and each one exists because something can go wrong without it:"
    - paragraph [ref=e54]:
      - strong [ref=e55]: Human-in-the-loop middleware
      - text: intercepts the
      - code [ref=e56]: write_script
      - text: tool call before it executes. You see what the agent is about to generate and can approve, edit the parameters, or reject with feedback. This isn't just a nice UX touch -- it means the expensive script generation LLM call only happens when you actually want it to.
    - paragraph [ref=e57]:
      - strong [ref=e58]: Tool call limit middleware
      - text: caps
      - code [ref=e59]: write_script
      - text: at 3 calls per session. Without this, a confused agent could enter a revision loop -- writing, deciding it's not good enough, rewriting, repeat. Three is enough for an initial draft plus a couple of refinements.
    - paragraph [ref=e60]:
      - strong [ref=e61]: Model call limit middleware
      - text: "is the bluntest instrument: 12 LLM calls per thread, then the agent wraps up. I'm funding this as a free demo, so runaway conversations would be a problem. This is the safety net that keeps my API bills from surprises."
    - heading "Why SSE Over WebSockets" [level=2] [ref=e62]
    - paragraph [ref=e63]: The data flow during generation is one-directional -- server streams tokens to the client. SSE handles that natively over standard HTTP, reconnects automatically, and doesn't fight proxies or load balancers. WebSockets would add complexity for no benefit here.
    - heading "Why a Separate Python Backend" [level=2] [ref=e64]
    - paragraph [ref=e65]: LangChain and LangGraph are Python-first. I could have squeezed the agent logic into Next.js API routes, but I'd be fighting the ecosystem instead of using it. Python handles orchestration; Next.js handles the UI. They talk over REST + SSE. Simple.
    - heading "Other Design Choices" [level=2] [ref=e66]
    - paragraph [ref=e67]: No auth, no database, no user accounts. This is a demo tool -- it should be frictionless. Rate limiting is IP-based to keep it fair without requiring signups. The discovery agent can run Tavily web searches on its own to research your product and industry, so you don't have to spoon-feed it everything.
